<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 20 TLDs - Domain Statistics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        .chart-container { width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <h1>Top 20 TLDs by Domain Count</h1>
    <div class="chart-container">
        <canvas id="tldChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('tldChart').getContext('2d');
        const tldChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['com', 'cn', 'org', 'de', 'net', 'uk', 'ru', 'fr', 'br', 'pl', 'nl', 'it', 'xyz', 'jp', 'info', 'eu', 'co', 'top', 'au', 'Others'],
                datasets: [{
                    data: [64702529, 6849651, 6004149, 5019309, 4300936, 3291219, 3251526, 2091692, 1871071, 1784475, 1673365, 1393007, 1314026, 1254852, 1240175, 1186654, 1143666, 1108789, 1066816, 23674559],
                    backgroundColor: [
                        '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40',
                        '#FF6384', '#C9CBCF', '#4BC0C0', '#FF6384', '#36A2EB', '#FFCE56',
                        '#9966FF', '#FF9F40', '#4BC0C0', '#FF6384', '#C9CBCF', '#36A2EB',
                        '#FFCE56', '#9966FF'
                    ]
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'right' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.raw.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
